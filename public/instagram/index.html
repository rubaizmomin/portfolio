<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0;url=/?via=instagram" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      (function(){
        try {
          const target = '/?via=instagram';
          if (location.pathname !== target) {
            location.replace(target);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    Redirecting to instagram...
  </body>
</html>
